<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive 3D Earth</title>
    <style>
        /* CSS Reset and full-screen setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Canvas container */
        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Loading UI */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease-out;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        p {
            margin: 0;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>

    <!-- Include Three.js via CDN (r128) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Include OrbitControls for touch/mouse interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div>Generating Universe...</div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Instructions Overlay -->
    <div id="ui-overlay">
        <h1>Planet Earth</h1>
        <p>Drag or swipe to rotate • Pinch to zoom</p>
    </div>

    <script>
        // Wait for the window to load before starting the 3D engine
        window.onload = function() {
            init3D();
        };

        function init3D() {
            // --- 1. Basic Setup (Scene, Camera, Renderer) ---
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();

            // Set up camera
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); // Pull camera back so we can see the earth

            // Set up renderer with antialiasing for smooth edges
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); // Crisp rendering on high-DPI screens
            container.appendChild(renderer.domElement);

            // --- 2. Lighting ---
            // Ambient light (base illumination so the dark side isn't pitch black)
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            // Directional light (acts as the sun)
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(5, 3, 5); // Position light to the top right
            scene.add(sunLight);

            // --- 3. Create the Earth ---
            // High-resolution sphere geometry (radius 1, 64 segments for smoothness)
            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);

            // Texture Loader with a loading manager to hide the splash screen when done
            const manager = new THREE.LoadingManager();
            manager.onLoad = () => {
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.style.opacity = '0';
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);
            };

            const textureLoader = new THREE.TextureLoader(manager);
            textureLoader.setCrossOrigin('anonymous'); // Important for loading external images

            // Load a reliable earth map texture from the Three.js repository
            const earthTextureUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg';
            const earthMap = textureLoader.load(earthTextureUrl);

            // Material for the Earth
            const earthMaterial = new THREE.MeshStandardMaterial({
                map: earthMap,
                roughness: 0.6, // Earth isn't perfectly shiny
                metalness: 0.1
            });

            // Create the mesh and add it to the scene
            const earth = new THREE.Mesh(earthGeometry, earthMaterial);
            // Tilt the Earth slightly (axial tilt is ~23.5 degrees)
            earth.rotation.z = 23.5 * Math.PI / 180;
            scene.add(earth);

            // --- 4. Create a Starfield Background ---
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000; // Number of stars
            const posArray = new Float32Array(starsCount * 3);

            for(let i = 0; i < starsCount * 3; i++) {
                // Generate random positions spread out in a large sphere
                posArray[i] = (Math.random() - 0.5) * 20;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starsMaterial = new THREE.PointsMaterial({
                size: 0.02,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            const starMesh = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starMesh);

            // --- 5. Interaction Controls ---
            // OrbitControls handles touch dragging, mouse dragging, and zooming perfectly
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Adds inertia to rotation
            controls.dampingFactor = 0.05;
            controls.enablePan = false; // Prevent dragging the earth off-center
            controls.minDistance = 1.5; // Prevent zooming inside the earth
            controls.maxDistance = 10;  // Prevent zooming out too far

            // --- 6. Animation Loop ---
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);

                const elapsedTime = clock.getElapsedTime();

                // Rotate the Earth slowly on its Y axis (independent of its Z tilt)
                earth.rotateY(0.001);

                // Rotate stars very slowly for a dynamic space feel
                starMesh.rotation.y = elapsedTime * 0.02;

                // Update controls for the damping effect
                controls.update();

                // Render the frame
                renderer.render(scene, camera);
            }

            // Start the loop
            animate();

            // --- 7. Handle Window Resizing ---
            window.addEventListener('resize', () => {
                // Update camera aspect ratio
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();

                // Update renderer size
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
            });
        }
    </script>
</body>
</html>
